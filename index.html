<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEL Furniture</title>

  <!-- LINK SHARED CSS -->
  <link rel="stylesheet" href="styles/shared.css" />

  <style>
    /* Page-specific styles for the image page */

    /* Image container */
    #image {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      flex-shrink: 0;
    }

    #image img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      object-fit: cover;
      object-position: center;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Bottom-left overlay email */
    #overlayText {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      color: white;
      font-family: sans-serif;
      font-size: 1.125rem;
      z-index: 10;
      white-space: normal;
    }

    #overlayText a {
      color: white;
      text-decoration: underline;
    }

    /* Mobile adjustments for overlayText only */
    @media (max-width: 768px) {
      #overlayText {
        bottom: 1rem;
        left: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Top-left MEL logo is handled in shared.css -->
  <div id="overlayText2">MEL</div>

  <!-- Main image and overlay email -->
  <div id="image">
    <img id="mainImage" src="images/photo1.jpg?v=9" alt="View of MEL's Radius Table sitting in long grass" />
    <div id="overlayText">
      Inquiries and purchase information: 
      <a href="mailto:office@mel.furniture?subject=Purchase%20Information%20Request">office@mel.furniture</a>
    </div>
  </div>

  <!-- Footer is handled in shared.css -->
  <footer>
    <div class="footer-container">
      <div class="footer-links">
        <a href="/information.html">Information</a>
        <a href="/terms-and-conditions.html">Terms & Conditions</a>
        <a href="https://www.instagram.com/mel_furniture" target="_blank">Instagram</a>
        <a href="/downloads.html">Downloads</a>
      </div>
      <div>&copy; MEL Furniture LLC</div>
    </div>
  </footer>

  <!-- Slideshow JS -->
  <script>
    const images = [
      { src: 'images/photo1.jpg?v=9', alt: "View of MEL's Radius Table in white outside amongst long grass" },
      { src: 'images/photo2.jpg?v=9', alt: "Close-up of MEL's Radius Table in brown on its side" }
    ];

    let index = 0;
    const mainImage = document.getElementById('mainImage');

    function updateImage() {
      mainImage.src = images[index].src;
      mainImage.alt = images[index].alt;
    }

    function nextImage() {
      index = (index + 1) % images.length;
      updateImage();
    }

    // Start slideshow
    let slideshowInterval = setInterval(nextImage, 5000);
    let idleTimeout = null;

    document.body.addEventListener('click', () => {
      nextImage();
      clearInterval(slideshowInterval);
      slideshowInterval = null;
      clearTimeout(idleTimeout);
      idleTimeout = setTimeout(() => {
        slideshowInterval = setInterval(nextImage, 5000);
      }, 15000);
    });

    updateImage();
  </script>

</body>
</html>
